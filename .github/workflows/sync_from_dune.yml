name: Sync from Dune

on:
  schedule:
    # 02:00 America/Sao_Paulo (UTC-3) -> 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-from-dune:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync incremental updates from Dune
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_LOOKBACK_HOURS: "30"
          SYNC_OWNER_ALLOWLIST: "balancer,balancerlabs"
          SYNC_REQUIRE_OWNER_MATCH: "true"
          SYNC_STRICT_NO_EXECUTION: "true"
          SYNC_LEGACY_INACTIVE_DAYS: "180"
          SYNC_LLM_FALLBACK_ENABLED: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -u scripts/sync_from_dune_incremental.py \
            --workflow-file sync_from_dune.yml \
            --summary-path /tmp/sync_from_dune_summary.json

      - name: Upload sync summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-from-dune-summary
          path: /tmp/sync_from_dune_summary.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Detect repository changes
        id: detect_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit sync changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore(sync): import queries from Dune UI"

      - name: Push directly to main
        id: push_main
        if: steps.detect_changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: git push origin HEAD:main

      - name: Push fallback branch
        id: push_branch
        if: steps.detect_changes.outputs.has_changes == 'true' && steps.push_main.outcome == 'failure'
        run: |
          BRANCH_NAME="codex/dune-sync-fallback-${GITHUB_RUN_ID}"
          git push origin HEAD:"${BRANCH_NAME}"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Open PR fallback
        if: steps.detect_changes.outputs.has_changes == 'true' && steps.push_main.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FALLBACK_BRANCH: ${{ steps.push_branch.outputs.branch_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          branch = os.environ["FALLBACK_BRANCH"]

          payload = {
              "title": "chore(sync): import queries from Dune UI",
              "head": branch,
              "base": "main",
              "body": (
                  "Direct push to `main` failed (likely branch protection).\n\n"
                  "This PR contains nightly Dune -> repo sync changes generated by CI."
              ),
              "maintainer_can_modify": True,
          }

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "balancer-dune-sync/1.0",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              body = json.loads(resp.read().decode("utf-8"))
          print(f"Created fallback PR: {body.get('html_url')}")
          PY
